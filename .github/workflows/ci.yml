name: CI — Conectia Backend

on:
  push:
    branches: [main, 'sprint*']
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

defaults:
  run:
    working-directory: backend

jobs:
  # ─── Unit + Property Tests (no DB required) ─────────────────────────────────
  unit-tests:
    name: Unit & Property Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Unit + Property tests
        run: npx vitest run tests/unit tests/property --reporter=verbose

      - name: Build
        run: npm run build

      - name: Security scan — tenantId must NOT appear in validation schemas
        run: |
          if grep -rn 'tenantId' src/modules/*/presentation/validation.ts 2>/dev/null; then
            echo "::error::SECURITY VIOLATION: tenantId found in validation schema"
            exit 1
          fi
          echo "Security scan passed: no tenantId in validation schemas"

  # ─── Integration + Stress + Chaos Tests (requires PostgreSQL) ───────────────
  integration-tests:
    name: Integration & Stress Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: conectia_test
          POSTGRES_USER: conectia_test
          POSTGRES_PASSWORD: conectia_test_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://conectia_test:conectia_test_pw@localhost:5432/conectia_test
      FIREBASE_PROJECT_ID: test-project
      NODE_ENV: test
      LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci

      - name: Install uuid-ossp extension
        run: psql $DATABASE_URL -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"

      - name: Run migrations
        run: |
          psql $DATABASE_URL -f migrations/001_init_financial_ledger.sql
          psql $DATABASE_URL -f migrations/002_tenant_ledger_state.sql
          psql $DATABASE_URL -f migrations/003_tenant_memberships_and_rls.sql

      - name: Integration tests
        run: npx vitest run tests/integration --reporter=verbose

      - name: Stress tests
        run: npx vitest run tests/stress --reporter=verbose

      - name: Chaos tests
        run: npx vitest run tests/chaos --reporter=verbose

      - name: Benchmark tests
        run: npx vitest run tests/benchmark --reporter=verbose

      - name: Webhook storm tests
        run: npx vitest run tests/storm --reporter=verbose

      - name: Zero skipped tests gate
        run: |
          OUTPUT=$(npx vitest run tests/integration tests/stress tests/chaos tests/benchmark tests/storm --reporter=json 2>/dev/null || true)
          SKIPPED=$(echo "$OUTPUT" | node -e "
            let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
              try { const j=JSON.parse(d); const s=j.numSkippedTests||0; console.log(s); }
              catch { console.log('0'); }
            });
          ")
          echo "Skipped tests: $SKIPPED"
          if [ "$SKIPPED" != "0" ]; then
            echo "::error::ZERO SKIPPED TESTS POLICY VIOLATION: $SKIPPED tests were skipped"
            exit 1
          fi

  # ─── Coverage Gate ─────────────────────────────────────────────────────────
  coverage:
    name: Coverage Gate (>= 80%)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci

      - name: Run tests with coverage
        run: npx vitest run tests/unit tests/property --coverage --coverage.reporter=json-summary

      - name: Check coverage threshold
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            PCT=$(node -e "const c=require('./coverage/coverage-summary.json'); console.log(c.total.statements.pct)")
            echo "Total statement coverage: ${PCT}%"
            node -e "
              const c = require('./coverage/coverage-summary.json');
              const pct = c.total.statements.pct;
              if (pct < 80) {
                console.error('FAIL: Coverage ' + pct + '% is below 80% threshold');
                process.exit(1);
              }
              console.log('PASS: Coverage ' + pct + '% meets 80% threshold');
            "
          else
            echo "::warning::Coverage report not generated. Skipping threshold check."
          fi
